      - generic [ref=f1e5]: Pre-diseño estructural · Vista frontal
      - heading "Calculadora de estructura del galpón" [level=1] [ref=f1e6]
      - paragraph [ref=f1e7]: Ajustá el ancho, la altura, la pendiente (o el ángulo, o el largo del hierro) y el perfil estructural. La geometría y el plano se recalculan al instante.
    - link "Administrar materiales" [ref=f1e8] [cursor=pointer]:
      - /url: admin.html
  - generic [ref=f1e9]: Esta herramienta es de pre-diseño, no reemplaza el proyecto ejecutivo. En Lavalleja, toda obra nueva requiere permiso de construcción con planos firmados por un arquitecto o ingeniero civil registrado ante la Intendencia. Los valores de cargas y separaciones marcados como "orientativos" deben ser verificados y calculados por ese técnico antes de construir.
