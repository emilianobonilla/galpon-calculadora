  - contentinfo [ref=f1e1077]: "Referencias: UNIT 50:84 \"Acción del viento sobre construcciones\" (velocidades características 135/158 km/h; presión dinámica de cálculo qc = Vc²/16,3; succión local amplificada en cumbrera y aristas para pendientes ≤30°, atenuándose hasta 40°). Ordenanza de Edificación e Higiene de la Vivienda de Lavalleja (altura mínima de locales habitables, Art. 54). Medidas y pesos de perfiles y capacidades de bulones: catálogos comerciales habituales en plaza (valores orientativos, pueden variar según fabricante)."